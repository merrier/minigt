name: Deploy to Master

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 # 确保获取所有分支

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Switch to main branch
        run: git checkout main

      - name: Copy build artifacts
        run: |
          # 将 dist 移出当前目录，防止被删除
          mv dist /tmp/dist
          # 删除当前目录下除隐藏文件夹和必要文件外的所有文件和目录
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '.github' ! -name 'README.md' ! -name '.gitignore' ! -name 'node_modules' -exec rm -rf {} +
          # 复制构建产物回来
          cp -r /tmp/dist/* .

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "Deploy to main $(date '+%Y-%m-%d %H:%M:%S')" &&
            git push origin main
          )
