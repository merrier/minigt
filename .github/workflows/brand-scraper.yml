name: Brand Scraper

on:
  schedule:
    - cron: "0 17 * * *" # 每天凌晨 1 点运行（北京时间上午 9 点）
  workflow_dispatch: # 允许手动触发

jobs:
  scrape-brands:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run brand scraper
        run: node scripts/brand-scraper-with-compare.js

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add data/
          git diff --cached --quiet || (
            git commit -m "Update brand information and logos - $(date +'%Y-%m-%d %H:%M:%S')" &&
            git push
          )
