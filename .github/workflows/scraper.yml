name: MINI GT Scraper

on:
  schedule:
    # 每天凌晨 2 点执行（北京时间上午 10 点）
    - cron: "0 18 * * *"
  workflow_dispatch: # 允许手动触发

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: node scripts/scraper-scan.js

      - name: Upload images to superbed
        env:
          SUPERBED_TOKEN: ${{ secrets.SUPERBED_TOKEN }}
        run: node scripts/upload-images.js

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git diff --cached --quiet || (
            git commit -m "Update MINI GT data $(date '+%Y-%m-%d %H:%M:%S')" &&
            git push
          )
